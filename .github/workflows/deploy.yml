name: Deploy to ECS

# Build the ARM64 image, push to ECR, register a new task-definition
# revision pinned to the commit SHA, then roll the ECS service to it.
on:
  push:
    branches: [master]
  workflow_dispatch: {}

# Never let two deploys run at once; queue them instead.
concurrency:
  group: deploy-ecs
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: stockmind-ai
  ECS_CLUSTER: stockmind-cluster
  ECS_SERVICE: stockmind-task-service
  ECS_TASK_FAMILY: stockmind-task
  CONTAINER_NAME: stockmind-app

permissions:
  contents: read

jobs:
  deploy:
    # Native Graviton runner — builds linux/arm64 directly, no QEMU emulation.
    # If this label is unavailable on your plan, switch to `ubuntu-latest` and
    # add a `docker/setup-qemu-action@v3` step before the build (much slower).
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          push: true
          # Single-arch image (no provenance/SBOM attestation manifest), which
          # Fargate pulls cleanly. Attestation manifest-lists break ECS pulls.
          provenance: false
          sbom: false
          build-args: |
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query 'taskDefinition' \
            --output json > task-definition.json

      - name: Render new image into task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          # Block until the new task is healthy in the target group and the old
          # one is drained — so a red check means the deploy actually failed.
          wait-for-service-stability: true
